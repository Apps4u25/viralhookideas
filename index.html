```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralHook Pro</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes shine { 100% { left: 125%; } }
        .animate-shine { animation: shine 0.8s ease-in-out; }
        body { background-color: #050505; color: white; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        input::placeholder { color: #333; }
        /* Prevent elastic scrolling on iOS */
        html, body { overscroll-behavior-y: contain; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component to handle Lucide CDN loading
        const LucideIcon = ({ name, size = 16, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const icon = window.lucide.icons[name];
                    const svg = icon.toSvg({
                        width: size,
                        height: size,
                        class: className,
                        'stroke-width': 2.5
                    });
                    if (iconRef.current) iconRef.current.innerHTML = svg;
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [topic, setTopic] = useState('');
            const [style, setStyle] = useState('curiosity');
            const [customTemplate, setCustomTemplate] = useState('How I used {t} to change my life');
            const [hooks, setHooks] = useState([]);
            const [saved, setSaved] = useState([]);
            const [toast, setToast] = useState('');

            const templates = {
                curiosity: ["The secret way I used {t} to blow up.", "Why everything you know about {t} is wrong.", "I found a {t} loophole that still works.", "Stop scrolling if you want to master {t}.", "The truth about {t} no one tells you."],
                story: ["How {t} took me from zero to hero.", "I tried {t} for 30 days and this happened.", "My biggest {t} mistake (don't do this).", "How I finally cracked the code on {t}.", "I spent $1000 on {t} research, here it is."],
                controversial: ["{t} is actually a waste of time.", "Stop listening to {t} experts.", "The {t} advice you hear is mostly a lie.", "Unpopular opinion: {t} is overrated.", "Why I stopped doing {t} the 'normal' way."],
                authority: ["The only {t} guide you'll ever need.", "3 steps to absolute {t} mastery.", "How to {t} like a professional.", "My proven blueprint for {t} success.", "The {t} checklist I use every day."],
                educational: ["How to master {t} without the struggle.", "The exact steps to perfect your {t}.", "Everything I know about {t} in 60 seconds.", "A beginner's guide to professional {t}.", "The simple science behind successful {t}."],
                mistake: ["Stop doing {t} until you watch this.", "The #1 mistake people make with {t}.", "Your {t} will fail if you keep doing this.", "Why most people are terrible at {t}.", "I almost ruined my career with this {t} mistake."],
                listicle: ["5 {t} tools that feel like cheating.", "3 ways to improve your {t} overnight.", "7 secrets to {t} that experts hide.", "The top 3 {t} hacks you need right now.", "4 signs you're actually good at {t}."],
                speed: ["How to get better at {t} in 24 hours.", "The fastest way to see results with {t}.", "Fix your {t} in less than 5 minutes.", "How I automated my entire {t} workflow.", "Double your {t} output in half the time."],
                custom: []
            };

            const triggerToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 2000);
            };

            const generate = () => {
                const t = topic.trim() || 'this topic';
                if (style === 'custom') {
                    if (!customTemplate.includes('{t}')) {
                        triggerToast("Use {t} in formula!");
                        return;
                    }
                    setHooks([customTemplate.replace(/{t}/g, t)]);
                } else {
                    setHooks(templates[style].map(h => h.replace(/{t}/g, t)));
                }
                // Scroll to results
                setTimeout(() => window.scrollTo({ top: 400, behavior: 'smooth' }), 100);
            };

            const copy = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                triggerToast('Copied to clipboard!');
            };

            const save = (h) => {
                if (!saved.includes(h)) {
                    setSaved([h, ...saved]);
                    triggerToast('Hook saved!');
                } else {
                    triggerToast('Already in vault');
                }
            };

            const remove = (idx) => {
                const updated = [...saved];
                updated.splice(idx, 1);
                setSaved(updated);
            };

            return (
                <div className="max-w-md mx-auto p-4 pb-32">
                    <header className="text-center py-10 space-y-2">
                        <div className="inline-flex p-3 bg-gradient-to-br from-pink-500 to-blue-500 rounded-2xl shadow-lg shadow-pink-500/20 mb-2">
                            <LucideIcon name="Zap" size={32} className="text-white fill-white" />
                        </div>
                        <h1 className="text-4xl font-black tracking-tighter bg-gradient-to-r from-pink-500 via-purple-500 to-blue-400 bg-clip-text text-transparent">VIRALHOOK</h1>
                        <p className="text-gray-500 text-[10px] uppercase tracking-[0.3em] font-bold">Precision TikTok Content</p>
                    </header>

                    <div className="bg-[#111] border border-white/5 rounded-[2rem] p-6 shadow-2xl space-y-6">
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-pink-500 uppercase tracking-widest ml-1">Your Topic</label>
                            <input 
                                type="text" 
                                value={topic} 
                                onChange={e => setTopic(e.target.value)} 
                                placeholder="e.g. Side Hustles" 
                                className="w-full bg-black border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-pink-500/50 transition-all font-medium" 
                            />
                        </div>
                        
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-blue-400 uppercase tracking-widest ml-1">Strategy</label>
                            <div className="grid grid-cols-3 gap-1.5">
                                {Object.keys(templates).map(s => (
                                    <button 
                                        key={s} 
                                        onClick={() => setStyle(s)} 
                                        className={`py-2.5 rounded-xl text-[9px] font-black uppercase tracking-wider transition-all border ${style === s ? 'bg-white/10 border-white/20 text-white shadow-inner' : 'bg-transparent border-white/5 text-gray-500'}`}
                                    >
                                        {s}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {style === 'custom' && (
                            <div className="space-y-2 animate-in slide-in-from-top-2 duration-300">
                                <label className="text-[10px] font-black text-purple-400 uppercase tracking-widest ml-1">Custom Formula</label>
                                <textarea 
                                    value={customTemplate} 
                                    onChange={e => setCustomTemplate(e.target.value)} 
                                    className="w-full bg-black border border-purple-500/30 rounded-2xl p-4 text-sm h-24 resize-none outline-none focus:border-purple-500" 
                                    placeholder="Use {t} for topic..."
                                />
                            </div>
                        )}

                        <button onClick={generate} className="group relative w-full py-5 bg-gradient-to-r from-pink-600 to-pink-500 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-pink-600/20 active:scale-95 transition-all overflow-hidden">
                            <span className="relative z-10 flex items-center justify-center gap-2">
                                <LucideIcon name="Sparkles" size={18} /> Generate Hooks
                            </span>
                        </button>
                    </div>

                    <div className="mt-10 space-y-5">
                        {hooks.map((h, i) => (
                            <div key={i} className="bg-[#0f0f0f] border border-white/5 rounded-3xl p-6 space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <p className="text-xl font-semibold leading-tight text-gray-100">{h}</p>
                                <div className="flex gap-2">
                                    <button onClick={() => copy(h)} className="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-all">
                                        <LucideIcon name="Copy" size={14} /> Copy
                                    </button>
                                    <button onClick={() => save(h)} className="flex-1 py-3 bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-all">
                                        <LucideIcon name="Heart" size={14} /> Save
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {saved.length > 0 && (
                        <div className="mt-16 pt-8 border-t border-white/5 space-y-4">
                            <div className="flex items-center gap-2 px-2">
                                <LucideIcon name="ShieldCheck" size={16} className="text-pink-500" />
                                <h2 className="text-xs font-black text-pink-500 uppercase tracking-[0.2em]">Saved Vault</h2>
                            </div>
                            {saved.map((h, i) => (
                                <div key={i} className="bg-[#080808] border-l-2 border-pink-600 p-4 rounded-r-2xl flex justify-between items-center gap-4 animate-in slide-in-from-left-4">
                                    <p className="text-sm text-gray-400 italic flex-1 line-clamp-2">"{h}"</p>
                                    <div className="flex gap-1">
                                        <button onClick={() => copy(h)} className="p-2 text-gray-600 hover:text-white"><LucideIcon name="Copy" size={18} /></button>
                                        <button onClick={() => remove(i)} className="p-2 text-gray-600 hover:text-red-500"><LucideIcon name="Trash2" size={18} /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <div className="mt-12">
                        <a 
                            href="https://www.buymeacoffee.com/Apps4u25" 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="group relative flex items-center justify-between bg-gradient-to-r from-[#FF813F] to-[#fd9939] p-5 rounded-[2rem] shadow-2xl shadow-orange-500/20 active:scale-95 transition-all overflow-hidden"
                        >
                            <div className="absolute top-0 -inset-full h-full w-1/2 z-5 block transform -skew-x-12 bg-gradient-to-r from-transparent to-white/20 opacity-40 group-hover:animate-shine" />
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-white/20 rounded-2xl">
                                    <LucideIcon name="Coffee" size={24} className="text-white fill-white animate-pulse" />
                                </div>
                                <div className="flex flex-col">
                                    <span className="text-[10px] font-black text-white/70 uppercase tracking-widest">Creator Support</span>
                                    <span className="text-lg font-black text-white">Buy me a coffee</span>
                                </div>
                            </div>
                            <div className="bg-white/20 p-2.5 rounded-full">
                                <LucideIcon name="ExternalLink" size={18} className="text-white" />
                            </div>
                        </a>
                    </div>

                    {toast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-4 rounded-full text-xs font-black shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-10 fade-in duration-300 z-[100]">
                            <LucideIcon name="CheckCircle" size={16} className="text-green-600" />
                            {toast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
