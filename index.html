    <style>
        :root {
            --bg: #000000;

</head>
<body>

<div class="app">
    <header>
        <h1>ViralHook</h1>
        <p style="color: #666; margin-top: 5px;">TikTok Hook Generator</p>
    </header>

    <div class="card">
        <div class="field">
            <label>Niche / Topic</label>
            <input type="text" id="topic" placeholder="e.g. Crypto, Fitness, Cooking" autocomplete="off">
        </div>
        <div class="field">
            <label>Style</label>
            <select id="style">
                <option value="curiosity">Curiosity</option>
                <option value="story">Story</option>
                <option value="controversial">Controversial</option>
                <option value="authority">Authority</option>
            </select>
        </div>
        <button class="main-btn" onclick="generate()">Generate 10 Hooks</button>
    </div>

    <div id="results"></div>
</div>

<div id="toast" class="toast">Copied!</div>
<textarea id="helper" style="position: absolute; left: -9999px;"></textarea>

<script>
    const data = {
        curiosity: ["The hidden reason {topic} isn't working.", "Stop scrolling if you want the truth about {topic}.", "I found a {topic} loophole you need to see.", "This {topic} hack feels illegal to know.", "99% of people fail at {topic} because of this.", "The secret to {topic} nobody tells you.", "Why your {topic} strategy is actually failing.", "I tried every {topic} tip, this is the only one that works.", "This {topic} insight will change your life.", "The bridge between you and {topic} success is this."],
        story: ["How I mastered {topic} in only 30 days.", "I almost quit {topic} until I found this.", "This is the {topic} mistake that cost me everything.", "How {topic} took me from zero to hero.", "What I wish I knew before starting {topic}.", "My biggest {topic} win came from this one move.", "I spent 100 hours researching {topic} so you don't have to.", "The hardest lesson I learned about {topic}.", "Why I stopped doing {topic} the old way.", "My life changed when I discovered this {topic} trick."],
        controversial: ["Unpopular opinion: {topic} is a waste of time.", "Stop listening to {topic} gurus immediately.", "{topic} advice on this app is mostly garbage.", "Why {topic} is actually killing your progress.", "I'm going to get cancelled for this {topic} take.", "The dark side of {topic} nobody talks about.", "Your favorite {topic} creator is lying to you.", "Why I'm officially done with {topic}.", "The 'perfect' {topic} routine is a scam.", "You don't need hard work to win at {topic}."],
        authority: ["3 non-negotiable rules for {topic}.", "How to get {topic} results like a pro.", "The exact {topic} blueprint for success.", "Steal my {topic} workflow today.", "Master {topic} with these 3 simple steps.", "The only {topic} guide you'll ever need.", "If I started {topic} from scratch, I'd do this.", "The framework for winning at {topic}.", "How to automate your {topic} results.", "Top 1% secrets for {topic} mastery."]
    };

    function generate() {
        const topic = document.getElementById('topic').value || "this";
        const style = document.getElementById('style').value;
        const list = data[style];
        const container = document.getElementById('results');
        
        container.innerHTML = '';
        
        list.forEach(t => {
            const hook = t.replace('{topic}', topic);
            const div = document.createElement('div');
            div.className = 'hook-box';
            div.innerHTML = `
                <div class="hook-text">${hook}</div>
                <button class="copy-btn" onclick="copy('${hook.replace(/'/g, "\\'")}', this)">COPY</button>
            `;
            container.appendChild(div);
        });
        
        window.scrollTo({top: container.offsetTop - 20, behavior: 'smooth'});
    }

    function copy(text, btn) {
        const helper = document.getElementById('helper');
        helper.value = text;
        helper.select();
        document.execCommand('copy');
        
        btn.innerText = '✓';
        btn.style.background = '#27ae60';
        
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
            btn.innerText = 'COPY';
            btn.style.background = '#222';
        }, 1500);
    }
</script>

</body>
</html>
